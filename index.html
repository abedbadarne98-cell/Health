<!DOCTYPE html>
<html>
<head>
    <title>HEALTH App</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
        }
        header {
            background: #2ecc71;
            color: white;
            padding: 20px;
            text-align: center;
        }
        nav {
            background: #27ae60;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }
        section {
            padding: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>🏥 HEALTH APP</h1>
    <p>Your personal health tracker</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Nutrition</a>
    <a href="#">Workouts</a>
    <a href="#">Blog</a>
</nav>

<section>
    <div class="card">
        <h2>🥗 Nutrition</h2>
        <p>Track your calories and healthy meals.</p>
    </div>

    <div class="card">
        <h2>🏋️ Workouts</h2>
        <p>Log your exercises and stay fit.</p>
    </div>

    <div class="card">
        <h2>🧠 Mental Health</h2>
        <p>Write your thoughts and track your mood.</p>
    </div>

    <div class="card">
        <h2>📚 Health Blog</h2>
        <p>Read useful health tips and guides.</p>
    </div>
</section>

</body>
</html>
