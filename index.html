<!DOCTYPE html>
<html>
<head>
    <title>HEALTH App</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
        }
        header {
            background: #2ecc71;
            color: white;
            padding: 20px;
            text-align: center;
        }
        nav {
            background: #27ae60;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }
        section {
            padding: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }
        input, button {
            padding: 10px;
            margin: 5px 0;
        }
    </style>
</head>

<body>

<header>
    <h1>🏥 HEALTH APP</h1>
    <p>Your personal health tracker</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Nutrition</a>
    <a href="#">Workouts</a>
    <a href="#">Blog</a>
</nav>

<section>

    <div class="card">
        <h2>🏋️ Workouts</h2>

        <input type="text" id="workoutInput" placeholder="Enter workout (e.g. Push-ups)">
        <br>
        <button onclick="addWorkout()">Add Workout</button>

        <ul id="workoutList"></ul>
    </div>

    <div class="card">
        <h2>🥗 Nutrition</h2>
        <p>Track your calories and healthy meals.</p>
    </div>

</section>

<script>
<script>
function getWorkouts() {
    return JSON.parse(localStorage.getItem("workouts") || "[]");
}

function saveWorkouts(workouts) {
    localStorage.setItem("workouts", JSON.stringify(workouts));
}

function renderWorkouts() {
    const list = document.getElementById("workoutList");
    list.innerHTML = "";

    const workouts = getWorkouts();

    workouts.forEach((w, index) => {
        const li = document.createElement("li");
        li.textContent = w + " ";

        const btn = document.createElement("button");
        btn.textContent = "❌";
        btn.onclick = function () {
            deleteWorkout(index);
        };

        li.appendChild(btn);
        list.appendChild(li);
    });
}

function addWorkout() {
    const input = document.getElementById("workoutInput");
    const value = input.value;

    if (!value) return;

    const workouts = getWorkouts();
    workouts.push(value);

    saveWorkouts(workouts);

    input.value = "";
    renderWorkouts();
}

function deleteWorkout(index) {
    const workouts = getWorkouts();
    workouts.splice(index, 1);
    saveWorkouts(workouts);
    renderWorkouts();
}

window.onload = renderWorkouts;
</script>
</script>

</body>
</html>
